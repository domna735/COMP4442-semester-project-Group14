<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Task</title>
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      background: linear-gradient(150deg, #eef9f6, #f7fcea);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1f2a1f;
      padding: 20px;
    }

    .card {
      width: min(620px, 96vw);
      background: #fff;
      border: 1px solid #dce7db;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 14px 32px rgba(16, 24, 40, 0.12);
    }

    h1 {
      margin-top: 0;
      color: #14532d;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    input,
    textarea,
    select {
      border: 1px solid #c8d7c8;
      border-radius: 9px;
      padding: 10px;
      font: inherit;
      width: 100%;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button,
    a {
      border: 0;
      border-radius: 9px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .primary {
      background: #0f766e;
      color: #fff;
    }

    .ghost {
      background: #eaf8f6;
      color: #0f766e;
    }

    .status {
      min-height: 22px;
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .err {
      color: #b91c1c;
    }

    .ok {
      color: #166534;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Edit Page</h1>
    <form id="edit-form">
      <div class="field">
        <label for="title">Title</label>
        <input id="title" maxlength="120" required />
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" maxlength="1000"></textarea>
      </div>
      <div class="field">
        <label for="status">Status</label>
        <select id="status">
          <option value="TODO">TODO</option>
          <option value="IN_PROGRESS">IN_PROGRESS</option>
          <option value="DONE">DONE</option>
        </select>
      </div>
      <div class="actions">
        <button class="primary" type="submit">Save Changes</button>
        <a class="ghost" href="/task.html">Back to Task Page</a>
      </div>
    </form>
    <div id="status-msg" class="status"></div>
  </main>
  <script src="/js/auth.js"></script>
  <script>
    const statusMsg = document.getElementById("status-msg");
    const taskId = new URLSearchParams(window.location.search).get("id");

    function setStatus(message, level) {
      statusMsg.textContent = message;
      statusMsg.className = "status " + level;
    }

        }

    async function loadTask() {
      if (!taskId) {
        setStatus("Missing task id in URL.", "err");
        return;
      }

      const res = await authFetch(`/api/v1/tasks/${taskId}`);
      if (!res.ok) {
        setStatus("Cannot load task.", "err");
        return;
      }

      const task = await res.json();
      document.getElementById("title").value = task.title || "";
      document.getElementById("description").value = task.description || "";
      document.getElementById("status").value = task.status || "TODO";
    }

    document.getElementById("edit-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!taskId) {
        setStatus("Missing task id in URL.", "err");
        return;
      }

      const payload = {
        title: document.getElementById("title").value.trim(),
        description: document.getElementById("description").value.trim(),
        status: document.getElementById("status").value
      };

      const res = await authFetch(`/api/v1/tasks/${taskId}`, {
        method: "PUT",
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const text = await res.text();
        setStatus("Update failed: " + text, "err");
        return;
      }

      setStatus("Task updated. Redirecting...", "ok");
      setTimeout(() => {
        window.location.href = "/task.html";
      }, 400);
    });

    (async () => {
      await ensureAuth();
      await loadTask();
    })();
  </script>
</body>

</html>
