<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Compute Home</title>
  <style>
    :root {
      --bg: #f4f7f2;
      --ink: #1f2a1f;
      --accent: #0f766e;
      --accent-2: #14532d;
      --panel: #ffffff;
      --line: #dce7db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, #e1efe3 0, transparent 38%),
        radial-gradient(circle at 80% 0%, #d8efe9 0, transparent 32%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(820px, 95vw);
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(16, 24, 40, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--accent-2);
    }

    p {
      margin: 0 0 18px;
      color: #334155;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .link-btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 700;
      background: #eaf8f6;
      color: var(--accent);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .muted {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Cloud Compute Task Manager</h1>
    <p>Home page for Task 3 UI. Register a user account, login, and manage your own tasks securely.</p>
    <div class="row">
      <a class="link-btn primary" href="/login.html">Login</a>
      <a class="link-btn" href="/register.html">Register</a>
      <a class="link-btn" href="/task.html">Task Page</a>
    </div>
    <div class="muted">Flow: Home -> Login/Register -> Task Page -> Edit Page</div>
  </main>
</body>
</html>
