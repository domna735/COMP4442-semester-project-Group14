<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Compute Home</title>
  <style>
    :root {
      --bg: #f4f7f2;
      --ink: #1f2a1f;
      --accent: #0f766e;
      --accent-2: #14532d;
      --panel: #ffffff;
      --line: #dce7db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, #e1efe3 0, transparent 38%),
        radial-gradient(circle at 80% 0%, #d8efe9 0, transparent 32%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(820px, 95vw);
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(16, 24, 40, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--accent-2);
    }

    p {
      margin: 0 0 18px;
      color: #334155;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .link-btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 700;
      background: #eaf8f6;
      color: var(--accent);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .muted {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #475569;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Cloud Compute Task Manager</h1>
    <p id="home-subtitle">Home page for Task 3 UI. Register a user account, login, and manage your own tasks securely.</p>
    <div class="row" id="home-actions">
      <a class="link-btn primary" href="/login.html">Login</a>
      <a class="link-btn" href="/register.html">Register</a>
      <a class="link-btn" href="javascript:void(0)" onclick="goToTasks()">Task Page</a>
    </div>
    <div class="muted" id="home-flow">Flow: Home -> Login/Register -> Task Page -> Edit Page</div>
    <div class="muted" id="auth-status"></div>
  </main>
  <hr style="margin: 30px 0;">

  <div id="file-section" style="max-width: 800px; margin: 0 auto; padding: 0 20px; display:none;">
    <h2>File Upload / Download</h2>

    <div style="margin: 20px 0; padding: 20px; border: 1px solid #eee; border-radius: 8px;">
      <h3>Upload New File</h3>
      <input type="file" id="fileInput" style="margin: 10px 0;">
      <br>
      <button onclick="uploadFile()"
        style="padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Upload File
      </button>
      <p id="uploadMessage" style="margin: 10px 0; font-weight: bold;"></p>
    </div>

    <div style="margin: 20px 0; padding: 20px; border: 1px solid #eee; border-radius: 8px;">
      <h3>Uploaded Files</h3>
      <ul id="fileList" style="line-height: 2; padding-left: 20px;">
        <li>Loading file list...</li>
      </ul>
    </div>
  </div>

  <script>
    function getToken() {
      return localStorage.getItem("accessToken") || sessionStorage.getItem("accessToken");
    }

    function clearAuthStorage() {
      localStorage.clear();
      sessionStorage.clear();
    }

    function goToTasks() {
      const token = getToken();

      if (!token || token === "null") {
        alert("Please login first to access the Task Manager.");
        window.location.href = "/login.html";
      } else {
        window.location.href = "/task.html";
      }
    }

    async function checkCurrentUser() {
      const token = getToken();
      if (!token) {
        return null;
      }
      try {
        const res = await fetch('/api/v1/auth/me', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          return null;
        }
        return await res.json();
      } catch {
        return null;
      }
    }

    function renderGuestHome() {
      document.getElementById('home-subtitle').textContent =
        'Home page for Task 3 UI. Register a user account, login, and manage your own tasks securely.';
      document.getElementById('home-actions').innerHTML = `
        <a class="link-btn primary" href="/login.html">Login</a>
        <a class="link-btn" href="/register.html">Register</a>
        <a class="link-btn" href="javascript:void(0)" onclick="goToTasks()">Task Page</a>
      `;
      document.getElementById('home-flow').textContent = 'Flow: Home -> Login/Register -> Task Page -> Edit Page';
      document.getElementById('auth-status').textContent = 'Current status: Guest';
      document.getElementById('file-section').style.display = 'none';
    }

    function renderLoggedInHome(user) {
      document.getElementById('home-subtitle').textContent =
        `Welcome back, ${user.username}. You are signed in and can continue your tasks.`;
      document.getElementById('home-actions').innerHTML = `
        <a class="link-btn primary" href="/task.html">Go To Task Page</a>
        <button class="link-btn" type="button" onclick="logoutFromHome()">Logout</button>
      `;
      document.getElementById('home-flow').textContent = 'Logged in flow: Home -> Task Page -> Edit Page';
      document.getElementById('auth-status').textContent = `Current status: Logged in as ${user.username}`;
      document.getElementById('file-section').style.display = 'block';
      loadFileList();
    }

    async function logoutFromHome() {
      const token = getToken();
      if (token) {
        try {
          await fetch('/api/v1/auth/logout', {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` }
          });
        } catch {
          // Ignore logout API errors; local logout should still proceed.
        }
      }
      clearAuthStorage();
      window.location.replace('/index.html');
    }

    window.onload = async function () {
      const user = await checkCurrentUser();
      if (!user) {
        clearAuthStorage();
        renderGuestHome();
        return;
      }
      renderLoggedInHome(user);
    };

    function uploadFile() {
      const fileInput = document.getElementById('fileInput');
      const messageBox = document.getElementById('uploadMessage');

      if (fileInput.files.length === 0) {
        messageBox.textContent = "Please select a file first!";
        messageBox.style.color = "red";
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      const token = getToken();
      if (!token) {
        messageBox.textContent = "Please login first.";
        messageBox.style.color = "red";
        return;
      }

      fetch('/api/v1/files/upload', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData
      })
        .then(async response => {
          const data = await response.text();
          if (!response.ok) {
            throw new Error(data || `HTTP ${response.status}`);
          }
          messageBox.textContent = data;
          messageBox.style.color = "green";
          fileInput.value = "";
          loadFileList();
        })
        .catch(error => {
          messageBox.textContent = "Upload failed: " + error;
          messageBox.style.color = "red";
        });
    }

    async function downloadFileWithAuth(fileName) {
      const token = getToken();
      if (!token) {
        alert("Please login first.");
        return;
      }

      try {
        const response = await fetch(`/api/v1/files/download/${encodeURIComponent(fileName)}`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      } catch (error) {
        alert("Download failed: " + error.message);
      }
    }

    function loadFileList() {
      const fileListElement = document.getElementById('fileList');
      fileListElement.innerHTML = "";

      const token = getToken();
      if (!token) {
        fileListElement.innerHTML = "<li>Please login to view files.</li>";
        return;
      }

      fetch('/api/v1/files/list', {
        headers: { Authorization: `Bearer ${token}` }
      })
        .then(async response => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          return response.json();
        })
        .then(fileNameList => {
          if (fileNameList.length === 0) {
            fileListElement.innerHTML = "<li>No files uploaded yet. Upload your first file!</li>";
            return;
          }

          fileNameList.forEach(fileName => {
            const liTag = document.createElement('li');
            const aTag = document.createElement('a');
            aTag.href = '#';
            aTag.textContent = fileName;
            aTag.style.color = "#007bff";
            aTag.addEventListener('click', (e) => {
              e.preventDefault();
              downloadFileWithAuth(fileName);
            });
            liTag.appendChild(aTag);
            fileListElement.appendChild(liTag);
          });
        })
        .catch(error => {
          fileListElement.innerHTML = "<li style='color: red;'>Failed to load file list: " + error + "</li>";
        });
    }
  </script>

</html>
